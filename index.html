<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Dia dos Namorados 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-particle {
      position: absolute;
      bottom: -50px;
      font-size: 1.2rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 100, 130, 0.25);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .emoji-top {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: #f9c6d0;
      line-height: 1.35;
      margin-bottom: 2rem;
    }

    .question {
      font-size: 1.1rem;
      color: #e8d0d8;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      padding: 0.65rem 2.2rem;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e8547a, #c03060);
      color: #fff;
      transition: box-shadow 0.15s;
    }

    .btn-yes:hover {
      box-shadow: 0 4px 20px rgba(200, 50, 90, 0.45);
    }

    .btn-no {
      background: rgba(255,255,255,0.08);
      color: #d4aab8;
      border: 1px solid rgba(255,150,170,0.3);
    }

    .btn-no:hover {
      background: rgba(255,255,255,0.12);
    }

    .btn-retry {
      background: rgba(255,255,255,0.08);
      color: #d4aab8;
      border: 1px solid rgba(255,150,170,0.3);
      margin-top: 1.5rem;
    }

    .btn-retry:hover {
      background: rgba(255,255,255,0.12);
    }

    /* Telas */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Tela de erro */
    .error-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 1.25rem;
    }

    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #f9c6d0;
      margin-bottom: 0.75rem;
    }

    .error-sub {
      font-size: 1rem;
      color: #c4909f;
      margin-bottom: 0.25rem;
    }

    /* Tela de sucesso */
    .success-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .success-msg {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #f9c6d0;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">

    <!-- Tela principal -->
    <div class="screen active" id="screenMain">
      <span class="emoji-top">💕</span>
      <h1>Feliz dia dos namoradoosss,<br>minha ex namoradaaa</h1>
      <p class="question">Você ainda vai namorar comigo e a gente vai casar?</p>
      <div class="buttons">
        <button class="btn btn-yes" onclick="handleYes()">Siiimm, lindo maravilhoso</button>
        <button class="btn btn-no"  onclick="showError()">Não, seu feioso😡</button>
      </div>
    </div>

    <!-- Tela de erro -->
    <div class="screen" id="screenError">
      <span class="error-emoji">🚫</span>
      <p class="error-title">Erro 404</p>
      <p class="error-sub">Essa opção não está disponível. Por favor, tente novamente</p>
      <button class="btn btn-retry" onclick="goBack()">Tentar novamente</button>
    </div>

    <!-- Tela de sucesso -->
    <div class="screen" id="screenSuccess">
      <span class="success-emoji">❤️</span>
      <p class="success-msg">Eu sabia que você ainda me amava, gatinhaaa, eu sei que sou incrível ❤️, eu também te amo muuiitoo</p>
    </div>

  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function handleYes() {
      showScreen('screenSuccess');
      launchHearts();
    }

    function showError() {
      showScreen('screenError');
    }

    function goBack() {
      showScreen('screenMain');
    }

    function createHearts() {
      const bg = document.getElementById('heartsBg');
      const emojis = ['❤️','💕','💖','💗','💓'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('span');
        el.className = 'heart-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
        el.style.animationDuration = (6 + Math.random() * 8) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        bg.appendChild(el);
      }
    }

    function launchHearts() {
      const bg = document.getElementById('heartsBg');
      bg.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('span');
        el.className = 'heart-particle';
        el.textContent = '❤️';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (1 + Math.random() * 2) + 'rem';
        el.style.animationDuration = (3 + Math.random() * 5) + 's';
        el.style.animationDelay = (Math.random() * 2) + 's';
        bg.appendChild(el);
      }
    }

    createHearts();
  </script>
</body>
</html>
