<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Dia dos Namorados 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-particle {
      position: absolute;
      bottom: -50px;
      font-size: 1.2rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 100, 130, 0.25);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .emoji-top {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: #f9c6d0;
      line-height: 1.35;
      margin-bottom: 2rem;
    }

    .question {
      font-size: 1.1rem;
      color: #e8d0d8;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    /* Container grande o suficiente para o botão Não se mover sem sair */
    .buttons-area {
      position: relative;
      width: 100%;
      height: 160px;
    }

    .btn {
      padding: 0.65rem 2.2rem;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      position: absolute;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e8547a, #c03060);
      color: #fff;
      transition: box-shadow 0.15s;
    }

    .btn-yes:hover {
      box-shadow: 0 4px 20px rgba(200, 50, 90, 0.45);
    }

    .btn-no {
      background: rgba(255,255,255,0.08);
      color: #d4aab8;
      border: 1px solid rgba(255,150,170,0.3);
      transition: left 0.15s ease, top 0.15s ease;
    }

    .btn-no:hover {
      background: rgba(255,255,255,0.12);
    }

    .success-msg {
      display: none;
    }

    .success-msg .big-heart {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .success-msg p {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #f9c6d0;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card" id="mainCard">
    <span class="emoji-top">💕</span>
    <h1>Feliz dia dos namoradooosss,<br>minha ex namoradaaa</h1>

    <p class="question">Você ainda vai namorar comigo e a gente vai casar?</p>

    <div class="buttons-area" id="buttonsArea">
      <button class="btn btn-yes" id="btnYes" onclick="handleYes()">Siimm</button>
      <button class="btn btn-no"  id="btnNo"  onclick="handleNo()">Não😡</button>
    </div>

    <div class="success-msg" id="successMsg">
      <span class="big-heart">❤️</span>
      <p>Eu sabia que você ainda me amava, gatinha, eu sei que sou incrível ❤️, eu também te amo</p>
    </div>
  </div>

  <script>
    const area   = document.getElementById('buttonsArea');
    const btnYes = document.getElementById('btnYes');
    const btnNo  = document.getElementById('btnNo');

    function positionButtons() {
      const aw = area.offsetWidth;
      const ah = area.offsetHeight;
      const yw = btnYes.offsetWidth;
      const yh = btnYes.offsetHeight;
      const nw = btnNo.offsetWidth;

      const centerY = (ah - yh) / 2;
      const totalW  = yw + 16 + nw;
      const startX  = (aw - totalW) / 2;

      btnYes.style.left = startX + 'px';
      btnYes.style.top  = centerY + 'px';
      btnNo.style.left  = (startX + yw + 16) + 'px';
      btnNo.style.top   = centerY + 'px';
    }

    function handleNo() {
      const aw = area.offsetWidth;
      const ah = area.offsetHeight;
      const nw = btnNo.offsetWidth;
      const nh = btnNo.offsetHeight;

      const curLeft = parseInt(btnNo.style.left) || 0;
      const curTop  = parseInt(btnNo.style.top)  || 0;

      // Move entre 80 e 160px em direção aleatória, mas fica dentro da área
      const angle = Math.random() * 2 * Math.PI;
      const dist  = 80 + Math.random() * 80;
      let newLeft = curLeft + Math.cos(angle) * dist;
      let newTop  = curTop  + Math.sin(angle) * dist;

      newLeft = Math.max(0, Math.min(aw - nw, newLeft));
      newTop  = Math.max(0, Math.min(ah - nh, newTop));

      btnNo.style.left = newLeft + 'px';
      btnNo.style.top  = newTop  + 'px';
    }

    function handleYes() {
      document.querySelector('h1').style.display = 'none';
      document.querySelector('.emoji-top').style.display = 'none';
      document.querySelector('.question').style.display = 'none';
      document.getElementById('buttonsArea').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      launchHearts();
    }

    function createHearts() {
      const bg = document.getElementById('heartsBg');
      const emojis = ['❤️','💕','💖','💗','💓'];
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('span');
        el.className = 'heart-particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
        el.style.animationDuration = (6 + Math.random() * 8) + 's';
        el.style.animationDelay = (Math.random() * 8) + 's';
        bg.appendChild(el);
      }
    }

    function launchHearts() {
      const bg = document.getElementById('heartsBg');
      bg.innerHTML = '';
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('span');
        el.className = 'heart-particle';
        el.textContent = '❤️';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (1 + Math.random() * 2) + 'rem';
        el.style.animationDuration = (3 + Math.random() * 5) + 's';
        el.style.animationDelay = (Math.random() * 2) + 's';
        bg.appendChild(el);
      }
    }

    createHearts();
    window.addEventListener('load', positionButtons);
    window.addEventListener('resize', positionButtons);
  </script>
</body>
</html>
